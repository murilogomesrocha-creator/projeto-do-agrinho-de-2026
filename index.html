<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estufa Sustentável - Agrinho 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo-agrinho">Agrinho 2026</div>
        <h1>🍅 Estufa de Tomate Sustentável</h1>
        <p>Agro Forte, Futuro Sustentável: Equilíbrio e Tecnologia</p>
    </header>

    <main class="container">
        <section class="estufa-visual">
            <div class="telhado"></div>
            <div class="estrutura">
                <div class="planta">🍅</div>
                <div class="planta">🍅</div>
                <div class="planta">🍅</div>
            </div>
            <div class="solo"></div>
            <div id="chuva-animada" class="chuva"></div>
        </section>

        <div class="dashboard">
            <div class="sensor-card">
                <h3>Umidade do Solo</h3>
                <div class="value" id="umidade">45%</div>
                <p id="status-agua">Solo Seco</p>
            </div>

            <div class="sensor-card">
                <h3>Temperatura</h3>
                <div class="value" id="temp">24°C</div>
                <p id="status-clima">Status: Ideal</p>
            </div>
        </div>

        <section class="actions">
            <button class="btn-irrigar" onclick="irrigar()">Ativar Irrigação Inteligente</button>
            <p class="info-sustentavel">🌱 Sistema utiliza água da chuva captada e energia solar.</p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
