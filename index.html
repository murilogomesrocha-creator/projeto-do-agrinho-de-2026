<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estufa Sustentável - Agrinho 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🍅 Tomateiro Sustentável 2026</h1>
        <p>Equilíbrio entre Produção e Meio Ambiente</p>
    </header>

    <main class="dashboard">
        <section class="sensor-card">
            <h2>Umidade do Solo</h2>
            <div class="value" id="umidade">45%</div>
            <p id="status-agua">Status: Solo Seco</p>
        </section>

        <section class="sensor-card">
            <h2>Temperatura</h2>
            <div class="value" id="temp">24°C</div>
            <p id="status-clima">Status: Ideal</p>
        </section>

        <section class="controls">
            <button onclick="irrigar()">Ativar Irrigação Eco</button>
            <p>Sistema utiliza 30% menos água via gotejamento.</p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
