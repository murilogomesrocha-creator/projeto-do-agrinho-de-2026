<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrinho 2026 - Produção Sustentável</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🍅 Estufa de Tomate Sustentável</h1>
        <p>Agro forte, futuro sustentável!</p>
    </header>

    <main>
        <section id="projeto">
            <h2>Pessoas, Tecnologia e Cuidado</h2>
            <p>Clique nos personagens ou na estufa para interagir.</p>
            
            <div class="container-interativo">
                <svg width="450" height="320" viewBox="0 0 450 320" xmlns="http://www.w3.org/2000/svg" class="svg-estufa">
                    <rect x="0" y="260" width="450" height="60" fill="#5d4037" />
                    
                    <path d="M 30 260 L 30 100 Q 225 0 420 100 L 420 260 Z" fill="rgba(224, 247, 250, 0.4)" stroke="#90a4ae" stroke-width="3"/>

                    <g id="solar" class="item-interativo" onclick="mostrarInfo('energia')">
                        <rect x="155" y="30" width="140" height="30" fill="#1a237e" rx="5" />
                        <line x1="155" y1="45" x2="295" y2="45" stroke="white" stroke-width="1" opacity="0.4"/>
                    </g>

                    <g id="plants" class="item-interativo" onclick="mostrarInfo('biologico')">
                        <path d="M 80 260 L 80 140" stroke="#2e7d32" stroke-width="3" fill="none"/>
                        <circle cx="80" cy="200" r="7" fill="#d32f2f" />
                        <path d="M 140 260 L 140 120" stroke="#2e7d32" stroke-width="3" fill="none"/>
                        <circle cx="140" cy="180" r="7" fill="#d32f2f" />
                        <path d="M 225 260 L 225 100" stroke="#2e7d32" stroke-width="4" fill="none"/>
                        <circle cx="225" cy="150" r="8" fill="#d32f2f" />
                        <circle cx="225" cy="110" r="3" fill="red" stroke="black" />
                    </g>

                    <g class="item-interativo" onclick="mostrarInfo('pessoas')">
                        <ellipse cx="110" cy="195" rx="18" ry="5" fill="#f5deb3" stroke="#8b4513" />
                        <path d="M 100 195 Q 110 180 120 195" fill="#f5deb3" stroke="#8b4513" />
                        <circle cx="110" cy="208" r="8" fill="#ffdbac" />
                        <rect x="102" y="216" width="16" height="30" fill="#1e88e5" rx="3" />
                    </g>

                    <g class="item-interativo" onclick="mostrarInfo('pessoas')">
                        <path d="M 330 205 Q 340 195 350 205" fill="#f06292" /> <rect x="340" y="203" width="15" height="3" fill="#f06292" rx="2" /> <circle cx="340" cy="215" r="8" fill="#8d5524" />
                        <rect x="332" y="223" width="16" height="25" fill="#f48fb1" rx="5" />
                    </g>

                    <g id="irrigation" class="item-interativo" onclick="mostrarInfo('agua')">
                        <rect x="40" y="255" width="370" height="8" fill="#0288d1" rx="4" />
                        <circle cx="225" cy="260" r="1.5" fill="white" class="gota" />
                    </g>
                </svg>
            </div>

            <div id="info-box">
                <p id="detalhe">Clique nas pessoas ou na produção!</p>
            </div>
        </section>

        <section class="sustentabilidade">
            <h3>Pessoas Protegidas, Campo Forte</h3>
            <p>A sustentabilidade começa com o respeito e a proteção de quem trabalha na terra.</p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
