<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrinho 2026 - Colheita Sustentável</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🍅 Super Estufa de Tomates Sustentável</h1>
        <p>Inovação e Tradição no Campo</p>
    </header>

    <main>
        <section id="projeto">
            <div class="container-interativo">
                <svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" class="svg-estufa">
                    <rect x="0" y="320" width="600" height="80" fill="#5d4037" />
                    
                    <path d="M 30 320 L 30 120 Q 300 -20 570 120 L 570 320 Z" fill="rgba(224, 247, 250, 0.4)" stroke="#90a4ae" stroke-width="4"/>

                    <g id="solar" class="item-interativo" onclick="mostrarInfo('energia')">
                        <rect x="200" y="20" width="200" height="40" fill="#1a237e" rx="5" />
                        <line x1="200" y1="40" x2="400" y2="40" stroke="white" stroke-width="1" opacity="0.3"/>
                    </g>

                    <g id="plants" class="item-interativo" onclick="mostrarInfo('biologico')">
                        <g transform="translate(100,0)">
                            <path d="M 0 320 L 0 160" stroke="#2e7d32" stroke-width="4" fill="none"/>
                            <circle cx="-5" cy="220" r="7" fill="#d32f2f" /><circle cx="5" cy="225" r="7" fill="#d32f2f" />
                        </g>
                        <g transform="translate(300,0)">
                            <path d="M 0 320 L 0 110" stroke="#2e7d32" stroke-width="5" fill="none"/>
                            <circle cx="-5" cy="150" r="8" fill="#d32f2f" /><circle cx="5" cy="155" r="8" fill="#d32f2f" /><circle cx="0" cy="140" r="8" fill="#d32f2f" />
                            <circle cx="0" cy="95" r="4" fill="red" stroke="black" /> 
                        </g>
                        <g transform="translate(500,0)">
                            <path d="M 0 320 L 0 160" stroke="#2e7d32" stroke-width="4" fill="none"/>
                            <circle cx="-5" cy="230" r="7" fill="#d32f2f" /><circle cx="5" cy="235" r="7" fill="#d32f2f" />
                        </g>
                    </g>

                    <g class="item-interativo" onclick="mostrarInfo('pessoas')">
                        <ellipse cx="140" cy="245" rx="20" ry="6" fill="#f5deb3" stroke="#8b4513" />
                        <circle cx="140" cy="258" r="9" fill="#ffdbac" />
                        <rect x="131" y="267" width="18" height="35" fill="#1e88e5" rx="3" />
                        
                        <path d="M 105 275 Q 105 295 125 295 Q 145 295 145 275 Z" fill="#d2b48c" stroke="#a0522d" />
                        <path d="M 105 275 Q 125 265 145 275" fill="none" stroke="#a0522d" stroke-width="1.5" /> <circle cx="125" cy="275" r="4" fill="#d32f2f" />

                        <path d="M 450 245 Q 460 235 470 245" fill="#f06292" />
                        <circle cx="460" cy="255" r="9" fill="#8d5524" />
                        <rect x="451" y="264" width="18" height="30" fill="#f48fb1" rx="5" />
                        
                        <path d="M 465 270 Q 465 290 485 290 Q 505 290 505 270 Z" fill="#d2b48c" stroke="#a0522d" />
                        <path d="M 465 270 Q 485 260 505 270" fill="none" stroke="#a0522d" stroke-width="1.5" /> <circle cx="480" cy="270" r="4" fill="#d32f2f" /><circle cx="490" cy="270" r="4" fill="#d32f2f" />
                    </g>

                    <g id="irrigation" class="item-interativo" onclick="mostrarInfo('agua')">
                        <rect x="50" y="315" width="500" height="10" fill="#0288d1" rx="5" />
                        <circle cx="300" cy="320" r="2" fill="white" class="gota" />
                    </g>
                </svg>
            </div>

            <div id="info-box">
                <p id="detalhe">Passe o mouse ou clique nos itens para ver a colheita!</p>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
